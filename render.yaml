services:
  - type: web
    name: rxguard-ai
    runtime: python
    buildCommand: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: freeservices:
  - type: web
    name: rxguard-ai
    env: python
    buildCommand: "pip install -r requirements.txt && python prepare_data.py && python download_datasets.py && python train_model.py"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
